<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Advanced Hack & Slash</title>
    <style>
        :root { --area-color: #1a1a1a; }
        body { background: var(--area-color); color: #eee; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #game-container { width: 95%; max-width: 800px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 20px; }
        
        /* エリア・ログ */
        .panel { background: rgba(0,0,0,0.7); border-radius: 10px; padding: 15px; border: 1px solid #444; }
        #game-log { height: 300px; overflow-y: scroll; font-size: 0.85em; background: #000; padding: 10px; margin-top: 10px; }
        
        /* ステータス・装備 */
        .status-box { border-left: 5px solid #0f0; margin-bottom: 10px; padding-left: 10px; }
        .inventory-item { background: #333; margin: 5px 0; padding: 8px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; }
        
        /* ボタン類 */
        button { cursor: pointer; background: #444; color: #fff; border: 1px solid #666; border-radius: 5px; padding: 8px 12px; }
        button:hover { background: #666; }
        button.equip-btn { background: #2e7d32; border: none; }
        button.active { background: #c62828; }
        
        .rare { color: #ffeb3b; font-weight: bold; }
        .skill { color: #00e5ff; }
    </style>
</head>
<body>

<h1>🏰 Dungeon Explorer</h1>

<div id="game-container">
    <div class="panel">
        <div id="area-title" style="font-size: 1.2em; font-weight: bold;">ステージ 1-1</div>
        <div id="enemy-view" style="font-size: 3em; margin: 20px 0; text-align: center;">🌲</div>
        
        <div class="status-box">
            <b><span id="job-name">未登録</span></b> Lv.<span id="lv">1</span><br>
            HP: <span id="hp">0</span> | ATK: <span id="atk-total">0</span><br>
            EXP: <span id="exp">0</span> / <span id="next-exp">100</span>
        </div>

        <div style="margin-top: 10px;">
            <button id="auto-btn" onclick="toggleAuto()">🌲 探索開始</button>
            <button onclick="gacha()">🎲 職業ガチャ</button>
        </div>

        <div id="game-log"></div>
    </div>

    <div class="panel">
        <div style="font-weight: bold; border-bottom: 1px solid #444; padding-bottom: 5px;">📦 カバン (最大10個)</div>
        <div id="inventory-list" style="height: 250px; overflow-y: auto; margin-top: 10px;">
            </div>
        
        <div style="margin-top: 20px; padding-top: 10px; border-top: 2px solid #555;">
            <b>⚔️ 現在の装備</b><br>
            <span id="current-weapon-name">素手</span> (ATK +<span id="current-weapon-atk">0</span>)
        </div>
    </div>
</div>

<script>
    // --- データ ---
    const JOBS = {
        "戦士": { hp: 120, atk: 15, growth: { hp: 12, atk: 4 } },
        "魔導師": { hp: 60, atk: 25, growth: { hp: 4, atk: 10 } },
        "勇者": { hp: 150, atk: 20, growth: { hp: 10, atk: 6 } }
    };
    const WEAPON_NAMES = ["鉄の剣", "鋼の斧", "銀の槍", "魔導の杖", "英雄の剣"];

    // --- 状態 ---
    let player = { job: "", lv: 1, hp: 0, atk: 0, exp: 0, nextExp: 100, weapon: { name: "素手", atk: 0 } };
    let inventory = [];
    let isAuto = false;
    let autoTimer = null;

    // --- ロジック ---
    function gacha() {
        const keys = Object.keys(JOBS);
        const selected = keys[Math.floor(Math.random() * keys.length)];
        player.job = selected;
        player.lv = 1;
        player.hp = JOBS[selected].hp;
        player.atk = JOBS[selected].atk;
        log(`✨ ${selected} に転職した！`);
        updateUI();
    }

    function toggleAuto() {
        if (!player.job) return alert("先にガチャを回してください！");
        isAuto = !isAuto;
        const btn = document.getElementById("auto-btn");
        if (isAuto) {
            btn.innerText = "🛑 探索中止";
            btn.classList.add("active");
            autoTimer = setInterval(battle, 1500);
        } else {
            btn.innerText = "🌲 探索開始";
            btn.classList.remove("active");
            clearInterval(autoTimer);
        }
    }

    function battle() {
        log(`敵と遭遇... 撃破！`);
        let gainExp = 30 + Math.floor(Math.random() * 20);
        player.exp += gainExp;

        // ドロップ判定 (25%)
        if (Math.random() < 0.25) {
            dropItem();
        }

        if (player.exp >= player.nextExp) levelUp();
        updateUI();
    }

    function dropItem() {
        if (inventory.length >= 10) {
            log("カバンがいっぱいでアイテムを諦めた...");
            return;
        }
        const name = WEAPON_NAMES[Math.floor(Math.random() * WEAPON_NAMES.length)];
        const atk = Math.floor(Math.random() * 20) + 5;
        const item = { id: Date.now(), name, atk };
        inventory.push(item);
        log(`<span class="rare">🎁 ${name} (ATK+${atk}) を拾った！</span>`);
        updateInventoryUI();
    }

    function equipItem(id) {
        const itemIndex = inventory.findIndex(i => i.id === id);
        const item = inventory[itemIndex];
        // 今の装備をカバンに戻す(素手以外)
        if (player.weapon.name !== "素手") {
            inventory.push(player.weapon);
        }
        // 新しいのを装備
        player.weapon = item;
        inventory.splice(itemIndex, 1);
        log(`⚔️ ${item.name} を装備した！`);
        updateUI();
        updateInventoryUI();
    }

    function discardItem(id) {
        inventory = inventory.filter(i => i.id !== id);
        updateInventoryUI();
    }

    function levelUp() {
        player.lv++;
        player.exp -= player.nextExp;
        player.nextExp = Math.floor(player.nextExp * 1.5);
        player.hp += 10;
        player.atk += 5;
        log(`<span class="rare">🆙 レベルアップ！ Lv.${player.lv}</span>`);
    }

    function updateUI() {
        document.getElementById("job-name").innerText = player.job || "未登録";
        document.getElementById("lv").innerText = player.lv;
        document.getElementById("hp").innerText = player.hp;
        document.getElementById("atk-total").innerText = player.atk + player.weapon.atk;
        document.getElementById("exp").innerText = player.exp;
        document.getElementById("next-exp").innerText = player.nextExp;
        document.getElementById("current-weapon-name").innerText = player.weapon.name;
        document.getElementById("current-weapon-atk").innerText = player.weapon.atk;
    }

    function updateInventoryUI() {
        const list = document.getElementById("inventory-list");
        list.innerHTML = "";
        inventory.forEach(item => {
            const div = document.createElement("div");
            div.className = "inventory-item";
            div.innerHTML = `
                <span>${item.name} (+${item.atk})</span>
                <div>
                    <button class="equip-btn" onclick="equipItem(${item.id})">装備</button>
                    <button onclick="discardItem(${item.id})">捨</button>
                </div>
            `;
            list.appendChild(div);
        });
    }

    function log(m) {
        const d = document.getElementById("game-log");
        d.innerHTML = m + "<br>" + d.innerHTML;
        d.scrollTop = 0;
    }
</script>
</body>
</html>
