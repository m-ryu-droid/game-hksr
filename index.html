<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Saga Mobile</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 70px; user-select: none; }
        
        /* タブ切り替え */
        .page { display: none; padding: 15px; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ヘッダー・ステータス */
        .top-bar { background: var(--panel); padding: 10px; text-align: center; border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 10; }
        
        /* 戦闘画面 */
        .battle-card { background: #000; border-radius: 15px; padding: 20px; text-align: center; border: 2px solid #334155; }
        .hp-bar { background: #334155; height: 10px; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        #enemy-hp { background: #ef4444; width: 100%; height: 100%; transition: 0.2s; }
        
        /* マップ画面 */
        .map-node { background: #334155; margin: 10px 0; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .map-node.locked { opacity: 0.5; pointer-events: none; }
        .map-node.current { border: 2px solid var(--accent); background: #1e293b; }

        /* 下部ナビゲーション */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--panel); display: flex; border-top: 1px solid #334155; height: 60px; }
        .nav-item { flex: 1; text-align: center; padding: 10px; font-size: 0.7em; cursor: pointer; color: #94a3b8; }
        .nav-item.active { color: var(--accent); font-weight: bold; }

        /* アイテム・装備 */
        .item-card { background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; margin-bottom: 8px; font-size: 0.8em; }
        .btn { background: var(--accent); color: #000; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; }
        .btn:disabled { background: #475569; }
    </style>
</head>
<body>

<div class="top-bar">
    <b>Lv.<span id="lv">1</span> <span id="job-name">未登録</span></b>
    <div style="font-size: 0.7em;">魔力の欠片: <span id="fragments">0</span></div>
</div>

<div id="page-battle" class="page active">
    <div id="current-area-display" style="text-align: center; font-size: 0.8em; margin-bottom: 10px; color: var(--accent);">始まりの平原 探索中...</div>
    <div class="battle-card">
        <div id="enemy-emoji" style="font-size: 4em;">🌲</div>
        <div id="enemy-name" style="font-weight: bold;">探索準備中</div>
        <div class="hp-bar"><div id="enemy-hp"></div></div>
        <div id="stage-progress" style="font-size: 0.7em; color: #94a3b8;">ボスまで: 0/10</div>
    </div>
    <button class="btn" id="auto-btn" onclick="toggleAuto()" style="width: 100%; margin-top: 15px; height: 50px;">探索を開始する</button>
    <div id="log" style="height: 100px; overflow-y: auto; font-size: 0.7em; margin-top: 10px; color: #94a3b8;"></div>
</div>

<div id="page-bag" class="page">
    <h3>現在の装備</h3>
    <div id="equips-list"></div>
    <hr>
    <h3>所持アイテム (<span id="bag-count">0</span>/12)</h3>
    <div id="inv-list"></div>
</div>

<div id="page-map" class="page">
    <h3>エリア選択</h3>
    <div id="map-container"></div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="showPage('battle', this)">⚔️<br>冒険</div>
    <div class="nav-item" onclick="showPage('bag', this)">📦<br>カバン</div>
    <div class="nav-item" onclick="showPage('map', this)">🗺️<br>マップ</div>
</nav>

<script>
    const AREAS = [
        { id: 0, name: "始まりの草原", set: "竜殺し", req: 0, enemies: ["🐜", "🐛"], boss: "👑🐜" },
        { id: 1, name: "静かな洞窟", set: "影の衣", req: 1, enemies: ["🦇", "🐍"], boss: "👹🦇" },
        { id: 2, name: "聖なる神殿", set: "守護者", req: 2, enemies: ["🛡️", "⚔️"], boss: "👼🛡️" }
    ];

    let p = { lv: 1, exp: 0, job: "冒険者", fragments: 0, equips: { head: null, body: null, legs: null, w1: null }, unlockedArea: 0 };
    let state = { currentArea: 0, kills: 0, stage: 1, isAuto: false, timer: null, enemy: null };
    let inv = [];

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
        updateUI();
    }

    function toggleAuto() {
        state.isAuto = !state.isAuto;
        const btn = document.getElementById('auto-btn');
        if (state.isAuto) {
            btn.innerText = "探索を中止する";
            btn.style.background = "#ef4444";
            state.timer = setInterval(tick, 1000);
        } else {
            btn.innerText = "探索を開始する";
            btn.style.background = "#38bdf8";
            clearInterval(state.timer);
        }
    }

    function changeArea(id) {
        if (state.isAuto) toggleAuto();
        state.currentArea = id;
        state.kills = 0;
        state.enemy = null;
        log(`📍 ${AREAS[id].name} へ移動しました。`);
        showPage('battle', document.querySelectorAll('.nav-item')[0]);
    }

    function tick() {
        if (!state.enemy) {
            const area = AREAS[state.currentArea];
            const isBoss = state.kills >= 10;
            state.enemy = { 
                n: isBoss ? "BOSS: " + area.boss : area.enemies[Math.floor(Math.random()*2)],
                hp: (isBoss ? 500 : 100) * (state.currentArea + 1),
                cur: (isBoss ? 500 : 100) * (state.currentArea + 1)
            };
        }

        let dmg = 20 * p.lv; // 簡易計算
        state.enemy.cur -= dmg;

        if (state.enemy.cur <= 0) {
            if (state.kills >= 10) {
                log("🎊 ボスを撃破！");
                if (p.unlockedArea === state.currentArea) p.unlockedArea++;
                state.kills = 0;
            } else {
                state.kills++;
                if (Math.random() < 0.3) drop();
            }
            state.enemy = null;
        }
        updateUI();
    }

    function drop() {
        if (inv.length >= 12) return;
        const part = ["head", "body", "legs", "w1"][Math.floor(Math.random()*4)];
        inv.push({ id: Date.now(), part, name: AREAS[state.currentArea].set + "の" + part, val: (state.currentArea + 1) * 10 });
        log("🎁 装備を拾った！");
    }

    function updateUI() {
        document.getElementById('lv').innerText = p.lv;
        document.getElementById('fragments').innerText = p.fragments;
        document.getElementById('current-area-display').innerText = AREAS[state.currentArea].name + " 探索中";
        document.getElementById('stage-progress').innerText = `ボスまで: ${state.kills}/10`;
        
        if (state.enemy) {
            document.getElementById('enemy-name').innerText = state.enemy.n;
            document.getElementById('enemy-hp').style.width = (state.enemy.cur / state.enemy.hp * 100) + "%";
        }

        // マップ描画
        const mapCont = document.getElementById('map-container');
        mapCont.innerHTML = "";
        AREAS.forEach(a => {
            const node = document.createElement('div');
            node.className = `map-node ${p.unlockedArea < a.req ? 'locked' : ''} ${state.currentArea === a.id ? 'current' : ''}`;
            node.innerHTML = `<div><b>${a.name}</b><br><small>推奨Lv: ${a.req*5 + 1}</small></div>
                              <button class="btn" onclick="changeArea(${a.id})" ${p.unlockedArea < a.req ? 'disabled' : ''}>移動</button>`;
            mapCont.appendChild(node);
        });

        // カバン描画
        document.getElementById('bag-count').innerText = inv.length;
        const invList = document.getElementById('inv-list');
        invList.innerHTML = "";
        inv.forEach(item => {
            const d = document.createElement('div');
            d.className = 'item-card';
            d.innerHTML = `<b>${item.name}</b> (強さ: ${item.val})<br>
                           <button class="btn" style="padding:4px;" onclick="equip(${item.id})">装備</button>`;
            invList.appendChild(d);
        });
    }

    function equip(id) {
        const item = inv.find(x => x.id === id);
        inv = inv.filter(x => x.id !== id);
        p.equips[item.part] = item;
        updateUI();
    }

    function log(m) { const d = document.getElementById('log'); d.innerHTML = `> ${m}<br>${d.innerHTML}`; }
    
    updateUI();
</script>
</body>
</html>
