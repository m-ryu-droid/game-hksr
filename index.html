<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Dungeon Crawler v7 - Synergy & Enchant</title>
    <style>
        :root { 
            --bg: #09090b; --panel: #16161e; --accent: #7aa2f7;
            --common: #a9b1d6; --rare: #2ac3de; --epic: #bb9af7; --legend: #ff9e64; --set: #73daca;
        }
        body { background: var(--bg); color: #c0caf5; font-family: 'Consolas', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #game-layout { display: grid; grid-template-columns: 320px 360px 360px; gap: 15px; padding: 20px; width: 1100px; }
        .panel { background: var(--panel); border-radius: 12px; padding: 15px; border: 1px solid #292e42; }
        h3 { margin: 0 0 10px 0; font-size: 0.85em; color: var(--accent); border-bottom: 1px solid #292e42; padding-bottom: 5px; text-transform: uppercase; }

        /* ステータス */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.8em; }
        .stat-item { background: #1a1b26; padding: 4px 8px; border-radius: 4px; display: flex; justify-content: space-between; }
        .bonus { color: var(--set); font-weight: bold; }

        /* バトルエリア */
        #battle-area { text-align: center; background: #000; border-radius: 10px; padding: 15px; border: 1px solid var(--accent); }
        .hp-bar { background: #24283b; width: 100%; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        #enemy-hp-fill { background: #f7768e; width: 100%; height: 100%; transition: width 0.15s; }

        /* インベントリ・装備 */
        #inventory-list { height: 480px; overflow-y: auto; }
        .item-card { margin-bottom: 8px; padding: 10px; border-radius: 8px; border: 1px solid #292e42; font-size: 0.8em; }
        .rarity-legend { border: 1px solid var(--legend); box-shadow: 0 0 8px rgba(255, 158, 100, 0.3); }
        
        .enchant-name { color: var(--accent); font-style: italic; font-weight: bold; }
        .set-name { color: var(--set); font-size: 0.85em; font-weight: bold; }
        .opt-tag { font-size: 0.8em; color: #9ece6a; margin-right: 5px; }
        
        button { cursor: pointer; border: none; border-radius: 4px; padding: 6px; font-weight: bold; }
        .btn-main { background: var(--accent); color: #1a1b26; width: 100%; margin-top: 10px; padding: 12px; }
        .btn-equip { background: #414868; color: #fff; }
        .stop { background: #f7768e !important; }

        #set-bonus-display { margin-top: 10px; font-size: 0.75em; color: var(--set); min-height: 40px; }
    </style>
</head>
<body>

<h1>⚔️ SYNERGY & ENCHANT ⚔️</h1>

<div id="game-layout">
    <div class="panel">
        <h3>📊 PLAYER STATS</h3>
        <div class="stat-grid" id="stat-list">
            </div>
        
        <h3 style="margin-top:20px;">💎 ACTIVE SET BONUS</h3>
        <div id="set-bonus-display">なし</div>

        <h3 style="margin-top:20px;">🛡️ EQUIPMENT</h3>
        <div id="current-equips" style="font-size: 0.75em;">
            <div id="eq-head"></div><div id="eq-body"></div><div id="eq-legs"></div><div id="eq-w1"></div>
        </div>
    </div>

    <div>
        <div id="battle-area">
            <div id="enemy-emoji" style="font-size: 4em;">🌲</div>
            <div id="enemy-name" style="font-weight:bold;">探索待機中</div>
            <div class="hp-bar"><div id="enemy-hp-fill"></div></div>
            <div id="progress" style="font-size:0.7em; margin-top:10px;">STAGE 1 | NEXT BOSS: 0/10</div>
        </div>
        <button id="run-btn" class="btn-main" onclick="toggleAuto()">EXPLORE START</button>
        <button class="btn-main" style="background:#24283b; color:#fff;" onclick="gacha()">NEW GAME (GACHA)</button>
        <div id="game-log" style="height:150px; overflow-y:scroll; background:#000; font-size:0.7em; padding:10px; margin-top:10px; color:#565f89; border:1px solid #292e42;"></div>
    </div>

    <div class="panel">
        <h3>📦 INVENTORY (<span id="bag-count">0/12</span>)</h3>
        <div id="inventory-list"></div>
    </div>
</div>

<script>
    const JOBS = { "戦士": { hp:250, atk:20, crit:5, spd:1200 }, "魔導師": { hp:120, atk:45, crit:15, spd:1500 }, "暗殺者": { hp:150, atk:30, crit:25, spd:800 } };
    const ENCHANTS = [
        { n: "破壊の", atk: 2.0 }, { n: "迅速の", spd: 0.6 }, { n: "不滅の", hp: 3.0 }, { n: "幸運の", crit: 20 }, { n: "凡庸な", atk: 1.1 }
    ];
    const SET_DEFS = {
        "ドラゴンスレイヤー": "ATK +100",
        "影の軍団": "CRIT +40",
        "聖騎士の誓い": "HP +500"
    };

    let p = { lv: 1, job: "", equips: { head:null, body:null, legs:null, w1:null } };
    let inv = [], isAuto = false, timer = null, enemy = null, state = { stage: 1, kills: 0 };

    function getStats() {
        if (!p.job) return {};
        let s = { ...JOBS[p.job], hp: JOBS[p.job].hp + p.lv*30, atk: JOBS[p.job].atk + p.lv*8 };
        let setCounts = {};

        Object.values(p.equips).forEach(eq => {
            if (!eq) return;
            // 基本オプション
            eq.opts.forEach(o => {
                if(o.type==='ATK') s.atk += o.val;
                if(o.type==='HP') s.hp += o.val*10;
                if(o.type==='CRIT') s.crit += o.val;
            });
            // エンチャント倍率
            if(eq.enchant.atk) s.atk *= eq.enchant.atk;
            if(eq.enchant.spd) s.spd *= eq.enchant.spd;
            if(eq.enchant.hp) s.hp *= eq.enchant.hp;
            if(eq.enchant.crit) s.crit += eq.enchant.crit;
            // セットカウント
            setCounts[eq.set] = (setCounts[eq.set] || 0) + 1;
        });

        // セットボーナス適用 (2点以上)
        let activeSets = [];
        for(let name in setCounts) {
            if(setCounts[name] >= 2) {
                activeSets.push(`${name} (${setCounts[name]})`);
                if(name === "ドラゴンスレイヤー") s.atk += 100;
                if(name === "影の軍団") s.crit += 40;
                if(name === "聖騎士の誓い") s.hp += 500;
            }
        }
        return { ...s, activeSets };
    }

    function dropItem() {
        if (inv.length >= 12) return;
        const part = ["head", "body", "legs", "w1"][Math.floor(Math.random()*4)];
        const rarityRoll = Math.random();
        let rarity = "common";
        if(rarityRoll < 0.1) rarity = "legend";
        else if(rarityRoll < 0.3) rarity = "epic";

        const enchant = ENCHANTS[Math.floor(Math.random()*ENCHANTS.length)];
        const set = Object.keys(SET_DEFS)[Math.floor(Math.random()*3)];
        
        let opts = [{type: 'ATK', val: Math.floor(Math.random()*10 + state.stage*5)}];
        if(rarity !== "common") opts.push({type: 'HP', val: Math.floor(Math.random()*20 + state.stage*10)});

        inv.push({ id: Date.now(), part, rarity, enchant, set, opts, name: part.toUpperCase() });
        updateUI();
    }

    function tick() {
        const stats = getStats();
        if(!enemy) {
            enemy = { n: "モンスター", hp: 100 * state.stage, cur: 100 * state.stage, e: "👹" };
        }
        let dmg = Math.floor(stats.atk);
        let critRoll = Math.random()*100 < stats.crit;
        if(critRoll) dmg *= 2;
        enemy.cur -= dmg;
        log(`${critRoll ? '⭐CRIT! ' : ''}${dmg} DMG!`);

        if(enemy.cur <= 0) {
            state.kills++;
            if(Math.random() < 0.5) dropItem();
            if(state.kills >= 10) { state.stage++; state.kills = 0; log("🚩 AREA UP!"); }
            enemy = null;
        }
        updateUI();
    }

    function toggleAuto() {
        if(!p.job) return;
        isAuto = !isAuto;
        const btn = document.getElementById("run-btn");
        if(isAuto) {
            btn.innerText = "STOP EXPLORING"; btn.classList.add("stop");
            timer = setInterval(tick, getStats().spd);
        } else {
            btn.innerText = "EXPLORE START"; btn.classList.remove("stop");
            clearInterval(timer);
        }
    }

    function updateUI() {
        if(!p.job) return;
        const s = getStats();
        const statHTML = `
            <div class="stat-item"><span>ATK</span><span class="stat-val">${Math.floor(s.atk)}</span></div>
            <div class="stat-item"><span>HP</span><span class="stat-val">${Math.floor(s.hp)}</span></div>
            <div class="stat-item"><span>CRIT</span><span class="stat-val">${s.crit}%</span></div>
            <div class="stat-item"><span>SPD</span><span class="stat-val">${(s.spd/1000).toFixed(1)}s</span></div>
        `;
        document.getElementById("stat-list").innerHTML = statHTML;
        document.getElementById("set-bonus-display").innerHTML = s.activeSets.length ? s.activeSets.join("<br>") : "なし";

        ["head", "body", "legs", "w1"].forEach(part => {
            const eq = p.equips[part];
            document.getElementById(`eq-${part}`).innerHTML = eq ? 
                `<span class="enchant-name">${eq.enchant.n}</span> ${eq.name} <br><span class="set-name">[${eq.set}]</span>` : `${part.toUpperCase()}: なし`;
        });

        if(enemy) {
            document.getElementById("enemy-name").innerText = enemy.n;
            document.getElementById("enemy-hp-fill").style.width = (enemy.cur/enemy.hp*100) + "%";
        }
        document.getElementById("progress").innerText = `STAGE ${state.stage} | NEXT BOSS: ${state.kills}/10`;
        document.getElementById("bag-count").innerText = `${inv.length}/12`;

        const list = document.getElementById("inventory-list");
        list.innerHTML = "";
        inv.forEach(i => {
            const d = document.createElement("div");
            d.className = `item-card rarity-${i.rarity}`;
            d.innerHTML = `
                <span class="enchant-name">${i.enchant.n}</span> <b>${i.name}</b><br>
                <span class="set-name">${i.set}</span><br>
                <button class="btn-equip" onclick="equip(${i.id})">EQUIP</button>
                <button style="background:#333; color:#aaa;" onclick="inv=inv.filter(x=>x.id!==${i.id});updateUI();">TRASH</button>
            `;
            list.appendChild(d);
        });
    }

    function equip(id) {
        const idx = inv.findIndex(x => x.id === id);
        const it = inv[idx];
        const old = p.equips[it.part];
        p.equips[it.part] = it;
        inv.splice(idx, 1);
        if(old) inv.push(old);
        if(isAuto) { clearInterval(timer); timer = setInterval(tick, getStats().spd); }
        updateUI();
    }

    function gacha() {
        p.job = Object.keys(JOBS)[Math.floor(Math.random()*3)];
        log(`JOB: ${p.job}`); updateUI();
    }

    function log(m) {
        const d = document.getElementById("game-log");
        d.innerHTML = `> ${m}<br>` + d.innerHTML;
    }
</script>
</body>
</html>
