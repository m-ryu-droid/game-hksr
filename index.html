<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Crawler - Life & Death</title>
    <style>
        :root { --bg: #0f1015; --panel: #1a1b26; --accent: #4cc9f0; --text: #e0e0e0; --hp: #f72585; --atk: #ff9e64; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding-bottom: 70px; user-select: none; }
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--panel); display: flex; border-top: 1px solid #333; height: 60px; z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 12px; font-size: 0.8em; color: #888; }
        .nav-item.active { color: var(--accent); font-weight: bold; }
        .card { background: var(--panel); border-radius: 12px; padding: 15px; border: 1px solid #292e42; margin-bottom: 15px; }
        .battle-view { background: #000; border-radius: 10px; padding: 20px; text-align: center; border: 2px solid #333; position: relative; }
        .hp-bar { background: #333; height: 12px; border-radius: 6px; overflow: hidden; margin: 8px 0; border: 1px solid #444; }
        .hp-fill { height: 100%; transition: width 0.2s; }
        #player-hp-fill { background: #4cc9f0; }
        #enemy-hp-fill { background: var(--hp); }
        .status-row { display: flex; justify-content: space-between; font-size: 0.85em; margin-bottom: 5px; }
        .equip-slot { background: #16161e; padding: 10px; border-radius: 8px; border: 1px solid #333; margin-bottom: 5px; font-size: 0.8em; }
        .item-card { background: #24283b; padding: 10px; border-radius: 8px; border: 1px solid #414868; font-size: 0.8em; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        button { cursor: pointer; border: none; border-radius: 6px; font-weight: bold; padding: 10px; }
        .btn-main { background: var(--accent); color: #000; width: 100%; font-size: 1em; }
        .stop { background: var(--hp) !important; color: #fff; }
        #game-log { height: 140px; overflow-y: scroll; background: #000; font-size: 0.75em; padding: 10px; color: #aaa; margin-top: 10px; border: 1px solid #333; border-radius: 8px; }
        .dmg-p { color: #f72585; font-weight: bold; }
        .dmg-e { color: #4cc9f0; font-weight: bold; }
    </style>
</head>
<body>

<div id="page-adventure" class="page active">
    <div class="battle-view">
        <div style="font-size: 0.7em; color: #888; margin-bottom: 5px;">STAGE <span id="stg">1</span></div>
        <div id="enemy-emoji" style="font-size: 4em;">👺</div>
        <div id="enemy-name" style="font-weight:bold;">探索中...</div>
        <div class="hp-bar"><div id="enemy-hp-fill" class="hp-fill"></div></div>
        
        <div style="margin-top: 15px; border-top: 1px solid #222; padding-top: 10px;">
            <div class="status-row"><span>自分 HP</span><span id="hp-txt">0/0</span></div>
            <div class="hp-bar"><div id="player-hp-fill" class="hp-fill"></div></div>
        </div>
    </div>
    
    <button id="run-btn" class="btn-main" onclick="toggleAuto()" style="margin-top: 15px;">⚔️ 探索を開始する</button>
    <div id="game-log"></div>
</div>

<div id="page-character" class="page">
    <div class="card">
        <h3>📊 詳細ステータス</h3>
        <div id="stat-list"></div>
    </div>
    <div class="card">
        <h3>🛡️ 装備中</h3>
        <div id="eq-list"></div>
    </div>
    <div class="card">
        <h3>📦 カバン (<span id="bag-cnt">0/12</span>)</h3>
        <div id="inv-list"></div>
    </div>
</div>

<nav class="nav-bar">
    <div class="nav-item active" onclick="showPage('adventure', this)">⚔️ 冒険</div>
    <div class="nav-item" onclick="showPage('character', this)">👤 キャラ</div>
</nav>

<script>
    const JOBS = { "戦士": { hp:400, atk:30, def:15, eva:5, spd:1300 }, "暗殺者": { hp:250, atk:45, def:5, eva:25, spd:900 } };
    const ENCHANTS = [{ n: "破壊の", atk: 1.8 }, { n: "守護の", def: 2.5 }, { n: "迅速の", spd: 0.7 }];

    let p = { lv: 1, job: "戦士", hp: 400, equips: { head:null, body:null, legs:null, w1:null } };
    let inv = [], isAuto = false, timer = null, enemy = null, state = { stage: 1, kills: 0 };

    function showPage(id, el) {
        document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        updateUI();
    }

    function getStats() {
        const base = JOBS[p.job];
        let s = { ...base, hpMax: base.hp + p.lv*50, atk: base.atk + p.lv*10, def: base.def + p.lv*5 };
        Object.values(p.equips).forEach(eq => {
            if(!eq) return;
            if(eq.enchant.atk) s.atk *= eq.enchant.atk;
            if(eq.enchant.def) s.def *= eq.enchant.def;
            if(eq.enchant.spd) s.spd *= eq.enchant.spd;
        });
        return s;
    }

    function tick() {
        const s = getStats();
        if(!enemy) {
            enemy = { n: "魔物", hp: 100 + (state.stage*60), cur: 0, atk: 15 + (state.stage*12) };
            enemy.cur = enemy.hp;
        }

        // 1. プレイヤーの攻撃
        let pDmg = Math.floor(s.atk * (Math.random() * 0.2 + 0.9));
        enemy.cur -= pDmg;
        log(`<span class="dmg-e">${enemy.n}に ${pDmg} のダメージ！</span>`);

        if(enemy.cur <= 0) {
            log(`🎊 ${enemy.n}を倒した！`);
            state.kills++;
            if(Math.random() < 0.4) drop();
            if(state.kills >= 10) { state.stage++; state.kills = 0; log("🚩 ステージアップ！"); }
            enemy = null;
        } else {
            // 2. 敵の攻撃（反撃）
            if(Math.random()*100 < s.eva) {
                log("💨 攻撃を回避した！");
            } else {
                let eDmg = Math.max(1, enemy.atk - Math.floor(s.def / 2));
                p.hp -= eDmg;
                log(`<span class="dmg-p">${eDmg} のダメージを受けた！</span>`);
                if(p.hp <= 0) {
                    log("💀 全滅した... 拠点へ撤退します。");
                    p.hp = s.hpMax; // 復活
                    enemy = null;
                    toggleAuto();
                }
            }
        }
        updateUI();
    }

    function drop() {
        if(inv.length >= 12) return;
        const part = ["head", "body", "legs", "w1"][Math.floor(Math.random()*4)];
        const enc = ENCHANTS[Math.floor(Math.random()*ENCHANTS.length)];
        inv.push({ id: Date.now(), part, n: enc.n + part, enchant: enc });
        log(`<span style="color:gold">🎁 装備ドロップ！</span>`);
    }

    function toggleAuto() {
        isAuto = !isAuto;
        const btn = document.getElementById("run-btn");
        btn.innerText = isAuto ? "🛑 探索を中止する" : "⚔️ 探索を開始する";
        btn.className = isAuto ? "btn-main stop" : "btn-main";
        if(isAuto) timer = setInterval(tick, getStats().spd); else clearInterval(timer);
    }

    function updateUI() {
        const s = getStats();
        document.getElementById("stg").innerText = state.stage;
        document.getElementById("hp-txt").innerText = `${Math.max(0, Math.floor(p.hp))}/${Math.floor(s.hpMax)}`;
        document.getElementById("player-hp-fill").style.width = (p.hp / s.hpMax * 100) + "%";
        
        if(enemy) {
            document.getElementById("enemy-name").innerText = enemy.n;
            document.getElementById("enemy-hp-fill").style.width = (enemy.cur / enemy.hp * 100) + "%";
        } else {
            document.getElementById("enemy-name").innerText = "探索中...";
            document.getElementById("enemy-hp-fill").style.width = "0%";
        }

        document.getElementById("stat-list").innerHTML = `
            <div class="status-row"><span>攻撃力</span><b>${Math.floor(s.atk)}</b></div>
            <div class="status-row"><span>防御力</span><b>${Math.floor(s.def)}</b></div>
            <div class="status-row"><span>回避率</span><b>${s.eva}%</b></div>
            <div class="status-row"><span>攻撃速度</span><b>${(s.spd/1000).toFixed(2)}秒</b></div>
        `;

        const pN = {head:"頭", body:"体", legs:"脚", w1:"武器"};
        document.getElementById("eq-list").innerHTML = Object.keys(pN).map(k => `
            <div class="equip-slot"><b>${pN[k]}</b>: ${p.equips[k] ? p.equips[k].n : 'なし'}</div>
        `).join("");

        document.getElementById("bag-cnt").innerText = inv.length;
        document.getElementById("inv-list").innerHTML = inv.map(i => `
            <div class="item-card">
                <span>${i.n}</span>
                <button class="btn-main" style="width:auto; padding:5px 10px;" onclick="equip(${i.id})">装備</button>
            </div>
        `).join("");
    }

    function equip(id) {
        const idx = inv.findIndex(x => x.id === id);
        const it = inv[idx];
        const old = p.equips[it.part];
        p.equips[it.part] = it;
        inv.splice(idx, 1);
        if(old) inv.push(old);
        p.hp = getStats().hpMax; // 装備変えたら一応全快
        updateUI();
    }

    function log(m) {
        const d = document.getElementById("game-log");
        d.innerHTML = `> ${m}<br>${d.innerHTML}`;
    }

    updateUI();
</script>
</body>
</html>
