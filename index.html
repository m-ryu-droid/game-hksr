<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>RPG Inventory Master</title>
    <style>
        :root { --main-bg: #121212; --panel-bg: #1e1e1e; }
        body { background: var(--main-bg); color: #e0e0e0; font-family: 'Hiragino Kaku Gothic Pro', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #game-layout { display: grid; grid-template-columns: 350px 400px; gap: 20px; padding: 20px; max-width: 800px; }
        
        .panel { background: var(--panel-bg); border-radius: 12px; padding: 15px; border: 1px solid #333; }
        .status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 0.9em; margin-bottom: 10px; }
        
        /* 敵表示エリア */
        #battle-area { text-align: center; background: linear-gradient(to bottom, #1a1a2e, #16213e); border-radius: 8px; padding: 20px; margin-bottom: 10px; }
        .hp-bar-bg { background: #444; width: 100%; height: 10px; border-radius: 5px; margin-top: 5px; overflow: hidden; }
        #enemy-hp-fill { background: #ff5252; width: 100%; height: 100%; transition: width 0.3s; }
        
        /* 装備スロット表示 */
        .equip-slots { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; font-size: 0.8em; }
        .slot { background: #252525; padding: 8px; border-radius: 5px; border: 1px dashed #555; }
        .slot b { color: #888; font-size: 0.7em; display: block; }

        /* カバン */
        #inventory-list { height: 350px; overflow-y: auto; background: #151515; border-radius: 5px; padding: 5px; }
        .item-card { background: #2c2c2c; margin-bottom: 5px; padding: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; font-size: 0.8em; }
        
        button { cursor: pointer; background: #3d5afe; color: white; border: none; border-radius: 4px; padding: 6px 12px; transition: 0.2s; }
        button:hover { background: #536dfe; }
        button.stop { background: #f44336; }
        
        #game-log { height: 150px; overflow-y: scroll; background: #000; color: #aaa; font-size: 0.75em; padding: 10px; margin-top: 10px; }
        .rare { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>

<h1>⚔️ Dungeon Crawler v2</h1>

<div id="game-layout">
    <div>
        <div id="battle-area" class="panel">
            <div id="area-name" style="font-size: 0.8em; color: #888;">Stage 1: 始まりの草原</div>
            <div id="enemy-emoji" style="font-size: 4em; margin: 10px 0;">🌳</div>
            <div id="enemy-name" style="font-weight: bold;">敵を探索中...</div>
            <div class="hp-bar-bg"><div id="enemy-hp-fill"></div></div>
        </div>

        <div class="panel">
            <div class="status-grid">
                <div><b>Lv:</b> <span id="lv">1</span></div>
                <div><b>Job:</b> <span id="job">未設定</span></div>
                <div><b>HP:</b> <span id="hp">0</span></div>
                <div><b>ATK:</b> <span id="atk">0</span></div>
            </div>
            
            <div class="equip-slots">
                <div class="slot"><b>HEAD</b><span id="eq-head">なし</span></div>
                <div class="slot"><b>BODY</b><span id="eq-body">なし</span></div>
                <div class="slot"><b>LEGS</b><span id="eq-legs">なし</span></div>
                <div class="slot"><b>WEAPON 1</b><span id="eq-w1">素手</span></div>
                <div class="slot"><b>WEAPON 2</b><span id="eq-w2">🔒 解放Lv.10</span></div>
            </div>
            
            <div style="margin-top: 15px;">
                <button id="run-btn" onclick="toggleAuto()">探索開始</button>
                <button onclick="gacha()">ガチャ</button>
            </div>
        </div>
        <div id="game-log" class="panel"></div>
    </div>

    <div class="panel">
        <div style="font-weight: bold; margin-bottom: 10px;">📦 カバン (アイテムをタップで装備)</div>
        <div id="inventory-list"></div>
    </div>
</div>

<script>
    // --- 職業データ ---
    const JOBS = {
        "戦士": { hp: 150, atk: 15 },
        "魔術師": { hp: 80, atk: 30 },
        "冒険者": { hp: 100, atk: 20 }
    };

    // --- 敵データ ---
    const ENEMIES = [
        { name: "スライム", e: "💧", hp: 50, atk: 5, exp: 40 },
        { name: "ワイルドボア", e: "🐗", hp: 120, atk: 15, exp: 100 },
        { name: "スケルトンナイト", e: "💀", hp: 300, atk: 40, exp: 300 }
    ];

    let player = {
        lv: 1, exp: 0, job: "", hp: 0, atk: 0,
        equips: { head: null, body: null, legs: null, w1: null, w2: null }
    };
    let inventory = [];
    let isAuto = false;
    let timer = null;
    let enemy = null;

    function gacha() {
        const keys = Object.keys(JOBS);
        player.job = keys[Math.floor(Math.random() * keys.length)];
        player.hp = JOBS[player.job].hp;
        player.atk = JOBS[player.job].atk;
        log(`✨ ${player.job} として転生した！`);
        updateUI();
    }

    function toggleAuto() {
        if (!player.job) return alert("先にガチャを！");
        isAuto = !isAuto;
        const btn = document.getElementById("run-btn");
        if (isAuto) {
            btn.innerText = "探索中止";
            btn.classList.add("stop");
            timer = setInterval(tick, 1000);
        } else {
            btn.innerText = "探索開始";
            btn.classList.remove("stop");
            clearInterval(timer);
        }
    }

    function tick() {
        if (!enemy) spawnEnemy();
        
        // プレイヤーの攻撃
        let pAtk = player.atk + 
                  (player.equips.w1 ? player.equips.w1.val : 0) + 
                  (player.equips.w2 ? player.equips.w2.val : 0);
        enemy.curHp -= pAtk;
        log(`⚔️ 敵に ${pAtk} ダメージ！`);

        if (enemy.curHp <= 0) {
            log(`🎊 ${enemy.name} を撃破！`);
            player.exp += enemy.exp;
            if (Math.random() < 0.4) dropItem();
            enemy = null;
            if (player.exp >= player.lv * 100) levelUp();
        } else {
            // 敵の攻撃
            let eAtk = Math.max(1, enemy.atk - ( (player.equips.body?.val || 0) + (player.equips.head?.val || 0) ));
            player.hp -= eAtk;
            if (player.hp <= 0) {
                log("💀 敗北した... 探索を中止します。");
                toggleAuto();
                player.hp = 10; // 救済
            }
        }
        updateUI();
    }

    function spawnEnemy() {
        let base = ENEMIES[Math.min(ENEMIES.length - 1, Math.floor(player.lv / 5))];
        enemy = { ...base, curHp: base.hp };
        updateUI();
    }

    function dropItem() {
        const parts = ["head", "body", "legs", "w1"];
        const part = parts[Math.floor(Math.random() * parts.length)];
        const val = Math.floor(Math.random() * (player.lv * 5)) + 5;
        const item = { id: Date.now(), part, val, name: `${part.toUpperCase()}+${val}` };
        inventory.push(item);
        log(`<span class="rare">🎁 アイテム入手: ${item.name}</span>`);
        updateInvUI();
    }

    function equip(id) {
        const idx = inventory.findIndex(i => i.id === id);
        const item = inventory[idx];
        
        if (item.part === 'w2' && player.lv < 10) return alert("スロット2はLv10から！");

        const old = player.equips[item.part];
        player.equips[item.part] = item;
        inventory.splice(idx, 1);
        if (old) inventory.push(old);
        
        updateInvUI();
        updateUI();
    }

    function levelUp() {
        player.lv++;
        player.atk += 5;
        player.hp += 20;
        log(`<span class="rare">🆙 レベルアップ！ Lv.${player.lv}</span>`);
        if (player.lv === 10) log("🔓 武器スロット2が解放された！");
    }

    function updateUI() {
        document.getElementById("lv").innerText = player.lv;
        document.getElementById("job").innerText = player.job || "---";
        document.getElementById("hp").innerText = Math.floor(player.hp);
        document.getElementById("atk").innerText = player.atk;
        
        if (enemy) {
            document.getElementById("enemy-name").innerText = enemy.name;
            document.getElementById("enemy-emoji").innerText = enemy.e;
            let pct = (enemy.curHp / enemy.hp) * 100;
            document.getElementById("enemy-hp-fill").style.width = pct + "%";
        }

        document.getElementById("eq-head").innerText = player.equips.head?.name || "なし";
        document.getElementById("eq-body").innerText = player.equips.body?.name || "なし";
        document.getElementById("eq-legs").innerText = player.equips.legs?.name || "なし";
        document.getElementById("eq-w1").innerText = player.equips.w1?.name || "素手";
        
        if (player.lv >= 10) {
            document.getElementById("eq-w2").innerText = player.equips.w2?.name || "素手";
        }
    }

    function updateInvUI() {
        const list = document.getElementById("inventory-list");
        list.innerHTML = "";
        inventory.forEach(i => {
            const d = document.createElement("div");
            d.className = "item-card";
            d.innerHTML = `<span>${i.name}</span> <button onclick="equip(${i.id})">装備</button>`;
            list.appendChild(d);
        });
    }

    function log(m) {
        const d = document.getElementById("game-log");
        d.innerHTML = m + "<br>" + d.innerHTML;
        d.scrollTop = 0;
    }
</script>
</body>
</html>
